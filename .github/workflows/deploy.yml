name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-north-1 
  EB_APP_NAME: LabElasticApp
  EB_ENV_NAME: LabElasticEnv
  # REPLACE WITH YOUR ACTUAL S3 BUCKET NAME CREATED FOR THE APP BUNDLES
  S3_BUCKET_NAME: alfred-elastic-beanstalk-lab-s3-bucket

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm install

    - name: Create ZIP Bundle
      # Package the app into a ZIP file, excluding git and github action files
      run: zip -r deploy.zip . -x "*.git*" -x ".github/*"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Upload to S3
      # Upload the created zip bundle to the specified S3 bucket
      run: aws s3 cp deploy.zip s3://${{ env.S3_BUCKET_NAME }}/deploy-${{ github.sha }}.zip

    - name: Create New Elastic Beanstalk Version
      run: |
        aws elasticbeanstalk create-application-version \
          --application-name ${{ env.EB_APP_NAME }} \
          --version-label ${{ github.sha }} \
          --source-bundle S3Bucket=${{ env.S3_BUCKET_NAME }},S3Key=deploy-${{ github.sha }}.zip \
          --description "Commit SHA: ${{ github.sha }}"

    - name: Update Elastic Beanstalk Environment
      run: |
        aws elasticbeanstalk update-environment \
          --environment-name ${{ env.EB_ENV_NAME }} \
          --version-label ${{ github.sha }}
