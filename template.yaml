AWSTemplateFormatVersion: '2010-09-09'
Description: Elastic Beanstalk Web App with S3 Source Bundle, CI/CD Ready + External DynamoDB (AmaliTech Lab)

Parameters:
  ApplicationName:
    Type: String
    Default: LabElasticApp

  EnvironmentName:
    Type: String
    Default: LabElasticEnv

  S3Bucket:
    Type: String
    Description: S3 bucket where application bundle is stored (to be uploaded by GitHub Actions)

  S3Key:
    Type: String
    Description: Path to ZIP file in S3 (e.g., app-v1.zip)

  InstanceType:
    Type: String
    Default: t3.micro

  SolutionStackName:
    Type: String
    Default: 64bit Amazon Linux 2 v5.8.4 running Node.js 18
    Description: Set to "64bit Amazon Linux 2 v3.5.7 running Corretto 17" if deploying Java.

Resources:

  # -------------------------------
  # Optional External Data Service (DynamoDB)
  # -------------------------------
  AppDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-AppTable"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # -------------------------------
  # Elastic Beanstalk Application
  # -------------------------------
  EBApplication:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: !Ref ApplicationName
      Description: Elastic Beanstalk App for CI/CD

  # -------------------------------
  # Application Version (S3 Source)
  # -------------------------------
  EBAppVersion:
    Type: AWS::ElasticBeanstalk::ApplicationVersion
    Properties:
      ApplicationName: !Ref EBApplication
      SourceBundle:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key

  # -------------------------------
  # IAM Role for EC2 Instances
  # -------------------------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-EB-EC2-Role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWorkerTier
        - arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: !GetAtt AppDynamoDBTable.Arn

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # -------------------------------
  # Elastic Beanstalk Environment
  # -------------------------------
  EBEnvironment:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      EnvironmentName: !Ref EnvironmentName
      ApplicationName: !Ref EBApplication
      SolutionStackName: !Ref SolutionStackName
      VersionLabel: !Ref EBAppVersion

      OptionSettings:
        # Instance config
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: !Ref InstanceType

        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref InstanceProfile

        # Make app public (LoadBalanced)
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: LoadBalanced

        # Environment variables (for external services)
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: NODE_ENV
          Value: production

        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DYNAMODB_TABLE_NAME
          Value: !Ref AppDynamoDBTable
          
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: AWS_REGION
          Value: !Ref AWS::Region

Outputs:
  AppURL:
    Description: Elastic Beanstalk URL
    Value: !GetAtt EBEnvironment.EndpointURL
  TableName:
    Description: DynamoDB Table Name for External Integration
    Value: !Ref AppDynamoDBTable