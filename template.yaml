AWSTemplateFormatVersion: '2010-09-09'
Description: Elastic Beanstalk Web App with S3 Source Bundle, CI/CD Ready

Resources:
  myApplication:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: "NodeJsApp"
      Description: AWS Elastic Beanstalk NodeJs Application

  myApplicationVersion:
    Type: AWS::ElasticBeanstalk::ApplicationVersion
    Properties:
      ApplicationName:
        Ref: myApplication
      Description: AWS ElasticBeanstalk NodeJs Application Version
      SourceBundle:
        S3Bucket: "elastic-beanstalk-lab-253775151832-eu-north-1-an" # TODO: Replace with parameter store key that references this value
        S3Key: nodejs-app.zip

  myConfigurationTemplate:
    Type: AWS::ElasticBeanstalk::ConfigurationTemplate
    Properties:
      ApplicationName:
        Ref: myApplication
      Description: AWS ElasticBeanstalk NodeJs Configuration Template
      OptionSettings:
        - Namespace: aws:autoscaling:asg
          OptionName: MinSize
          Value: '1'
        - Namespace: aws:autoscaling:asg
          OptionName: MaxSize
          Value: '4'
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: LoadBalanced
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref MyInstanceProfile
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: DYNAMODB_TABLE_NAME
          Value: !Ref MyDynamoDBTable
      SolutionStackName: 64bit Amazon Linux 2023 v6.10.3 running Node.js 24

  myEnvironment:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      ApplicationName:
        Ref: myApplication
      Description: AWS ElasticBeanstalk NodeJs Environment
      TemplateName:
        Ref: myConfigurationTemplate
      VersionLabel:
        Ref: myApplicationVersion

  MyDynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "NodeJsAppTable"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  MyInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      Description: Beanstalk EC2 role
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkMulticontainerDocker
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWorkerTier
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Scan
                Resource: !GetAtt MyDynamoDBTable.Arn

  MyInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties: 
      Roles:
        - !Ref MyInstanceRole